services:
  db:
    image: postgres:16-alpine
    container_name: compro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: compro
    ports:
      - "5432:5432"
    volumes:
      - compro-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d compro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  compro-db-data:
